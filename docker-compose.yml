version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    volumes:
      # файлы проектов сохраняются на хосте — не потеряются при перезапуске контейнера
      - uploads_data:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # пустой URL = фронт шлёт запросы на тот же домен, nginx проксирует на бэкенд
        - VITE_API_URL=
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
