version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: supervisormatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supervisormatch_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      # база внутри docker-сети, обращаемся по имени сервиса "db"
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-supervisormatch_secret}@db:5432/supervisormatch
      DIRECT_URL: postgresql://postgres:${DB_PASSWORD:-supervisormatch_secret}@db:5432/supervisormatch
      CORS_ORIGIN: "*"
      PORT: "4000"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-8f2c7b4d91a6e3f0c5b8a1d7e9f4c2b6a0d3e8f1c7b5a9d2e4f6c1b8a3d7e0f5}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-3e9a1c7f5b2d8e4a0f6c9b1d7e3a5f2c8d4b0e6f1a9c7b3d5e2f8a0c6b1d4e7}
      HASH_SALT: ${HASH_SALT:-supersecret_salt}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # пустой = nginx проксирует на бэкенд
        - VITE_API_URL=
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  uploads_data:
